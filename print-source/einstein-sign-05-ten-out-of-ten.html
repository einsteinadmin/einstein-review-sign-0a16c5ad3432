<!DOCTYPE html><html><head><meta charset="UTF-8"><style>
@font-face { font-family:'Roboto'; font-weight:700; src:url('Roboto-700.woff2') format('woff2'); }
@font-face { font-family:'Thirsty Script'; font-weight:700; src:url('ThirstyScript-Bold.otf') format('opentype'); }
@font-face { font-family:'Bebas Neue'; font-weight:400; src:url('BebasNeue-Regular.ttf') format('truetype'); }
@page { size: 18.25in 24.25in; margin: 0; }
* { margin:0; padding:0; box-sizing:border-box; }
html,body { width:18.25in; height:24.25in; -webkit-print-color-adjust:exact; print-color-adjust:exact; }
body { font-family:'Roboto',sans-serif; }
.sign { width:18.25in; height:24.25in; display:flex; flex-direction:column; overflow:hidden; }
.body { flex:1; display:flex; flex-direction:column; justify-content:center; align-items:center; text-align:center; padding:1.2in 1.2in 0.4in; }
.logofoot { flex-shrink:0; display:flex; flex-direction:column; align-items:center; gap:0.3in; padding-bottom:1.2in; }
.logofoot img { height:2.1in; }
</style></head><body><div class="sign" style="background:#EF8B22;">
<div class="body">
<div style="font-size:6in; font-weight:700; letter-spacing:-0.22in; line-height:0.95; color:#27343D;">10/10</div>
<div style="font-size:1.8in; font-weight:700; color:#FFFFFF; margin-top:0.55in;">WOULD MOVE AGAIN</div>
<div style="font-family:'Thirsty Script'; font-weight:700; font-size:0.8in; color:#27343D; margin-top:0.4in; transform:rotate(-2deg);">(hopefully not for a while)</div>
</div><div class="logofoot"><img src="logo-reverse.svg"></div></div></body></html>
